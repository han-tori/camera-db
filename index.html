<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📷 My Camera Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --surface: #141416;
  --surface2: #1c1c20;
  --border: #2a2a30;
  --text: #e8e8ed;
  --text2: #8a8a95;
  --accent-film: #e8a44a;
  --accent-digital: #4a9de8;
  --accent-lens: #9b6de8;
  --red: #e85454;
  --green: #54e88a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'IBM Plex Sans KR', 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  padding: 40px 32px 24px;
  max-width: 1400px;
  margin: 0 auto;
}
.header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
}
.header h1 span { opacity: 0.4; font-weight: 400; margin-left: 8px; font-size: 1rem; }
.header p { color: var(--text2); margin-top: 6px; font-size: 0.9rem; }

/* Stats bar */
.stats {
  display: flex; gap: 24px;
  padding: 16px 32px;
  max-width: 1400px;
  margin: 0 auto;
}
.stat {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.85rem; color: var(--text2);
}
.stat .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.stat .count { font-weight: 600; color: var(--text); }

/* Tabs */
.tabs {
  display: flex; gap: 4px;
  padding: 0 32px;
  max-width: 1400px;
  margin: 16px auto;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 12px 20px;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--text); }
.tab .badge {
  display: inline-block;
  background: var(--surface2);
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 0.75rem;
  margin-left: 6px;
}

/* Search */
.search-bar {
  padding: 16px 32px;
  max-width: 1400px;
  margin: 0 auto;
}
.search-bar input {
  width: 100%;
  max-width: 400px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  font-family: inherit;
}
.search-bar input::placeholder { color: var(--text2); }
.search-bar input:focus { border-color: var(--text2); }

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 8px 32px 60px;
  max-width: 1400px;
  margin: 0 auto;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.card:hover {
  border-color: var(--text2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.card .type-indicator {
  position: absolute;
  top: 0; left: 20px;
  width: 32px; height: 3px;
  border-radius: 0 0 3px 3px;
}
.card.film .type-indicator { background: var(--accent-film); }
.card.digital .type-indicator { background: var(--accent-digital); }
.card.lens .type-indicator { background: var(--accent-lens); }

.card .brand {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
  margin-bottom: 4px;
}
.card .model-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.3rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.card .tag-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.tag {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.tag.film { background: rgba(232,164,74,0.15); color: var(--accent-film); }
.tag.digital { background: rgba(74,157,232,0.15); color: var(--accent-digital); }
.tag.lens { background: rgba(155,109,232,0.15); color: var(--accent-lens); }
.tag.mount { background: var(--surface2); color: var(--text2); }
.tag.owned { background: rgba(84,232,138,0.15); color: var(--green); }

.card .specs-preview {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  font-size: 0.8rem;
}
.card .spec-item { color: var(--text2); }
.card .spec-item strong { color: var(--text); font-weight: 500; }

/* Modal Overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  overflow-y: auto;
  padding: 40px 20px;
}
.modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 640px;
  width: 100%;
  padding: 32px;
  position: relative;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
.modal .close-btn {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal .close-btn:hover { color: var(--text); border-color: var(--text2); }

.modal .modal-header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.modal .modal-brand {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text2);
}
.modal .modal-model {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin: 4px 0 12px;
}
.modal .modal-tags {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.modal .modal-note {
  font-size: 0.85rem;
  color: var(--text2);
  margin-top: 8px;
  font-style: italic;
}
.modal .spec-section {
  margin-bottom: 20px;
}
.modal .spec-section h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text2);
  margin-bottom: 10px;
}
.modal .spec-grid {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 6px 12px;
  font-size: 0.85rem;
}
.modal .spec-label { color: var(--text2); }
.modal .spec-value { color: var(--text); font-weight: 400; }
.modal .spec-value.highlight { color: var(--green); font-weight: 500; }
.modal .spec-value.warn { color: var(--red); font-weight: 500; }

/* Compare bar */
.compare-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 32px;
  display: none;
  align-items: center;
  gap: 16px;
  z-index: 90;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
}
.compare-bar.show { display: flex; }
.compare-bar .selected-items { display: flex; gap: 8px; flex: 1; }
.compare-bar .selected-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.85rem;
  display: flex; align-items: center; gap: 6px;
}
.compare-bar .selected-chip .remove {
  cursor: pointer; opacity: 0.5; font-size: 0.7rem;
}
.compare-bar .selected-chip .remove:hover { opacity: 1; }
.compare-bar .compare-btn {
  background: var(--accent-digital);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.compare-bar .compare-btn:disabled { opacity: 0.4; cursor: default; }
.compare-bar .compare-btn:not(:disabled):hover { filter: brightness(1.1); }

.card .compare-check {
  position: absolute;
  top: 12px; right: 12px;
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  transition: all 0.2s;
  z-index: 2;
}
.card .compare-check:hover { border-color: var(--accent-digital); }
.card .compare-check.checked {
  background: var(--accent-digital);
  border-color: var(--accent-digital);
  color: #fff;
}

/* Compare modal */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin-top: 16px;
}
.compare-table th {
  text-align: left;
  padding: 8px 10px;
  color: var(--text2);
  font-weight: 400;
  font-size: 0.75rem;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.compare-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.compare-table td.better { color: var(--green); font-weight: 500; }
.compare-table .model-header {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 600;
  font-size: 1rem;
}

/* Responsive */
@media (max-width: 640px) {
  .header { padding: 24px 16px 16px; }
  .header h1 { font-size: 1.6rem; }
  .stats, .tabs, .search-bar, .grid { padding-left: 16px; padding-right: 16px; }
  .grid { grid-template-columns: 1fr; }
  .modal { padding: 24px 20px; }
}
</style>
</head>

<div class="header">

  <p>카메라 & 렌즈 스펙 데이터베이스</p>
</div>

  <div class="tab" data-filter="lens">🔭 렌즈 <span class="badge" id="count-lens"></span></div>

<div class="search-bar">

<div class="grid" id="grid"></div>

<div class="compare-bar" id="compare-bar">

<div class="modal-overlay" id="modal-overlay">

</div>

let currentFilter = 'all';
let searchQuery = '';
let compareList = []; // {kind, id}

// ── RENDER ──
function init() {
  const filmCount = DATA.cameras.filter(c => c.type === 'film').length;
  const digitalCount = DATA.cameras.filter(c => c.type === 'digital').length;
  const lensCount = DATA.lenses.length;
  const total = DATA.cameras.length + DATA.lenses.length;

  document.getElementById('count-all').textContent = total;
  document.getElementById('count-film').textContent = filmCount;
  document.getElementById('count-digital').textContent = digitalCount;
  document.getElementById('count-lens').textContent = lensCount;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="dot" style="background:var(--accent-film)"></div>필름 <span class="count">${filmCount}</span></div>
    <div class="stat"><div class="dot" style="background:var(--accent-digital)"></div>디지털 <span class="count">${digitalCount}</span></div>
    <div class="stat"><div class="dot" style="background:var(--accent-lens)"></div>렌즈 <span class="count">${lensCount}</span></div>
    <div class="stat" style="margin-left:auto">총 <span class="count">${total}</span>개</div>
  `;

  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let items = [];

  if (currentFilter === 'all' || currentFilter === 'film') {
    items.push(...DATA.cameras.filter(c => c.type === 'film').map(c => ({...c, _kind: 'camera'})));
  }
  if (currentFilter === 'all' || currentFilter === 'digital') {
    items.push(...DATA.cameras.filter(c => c.type === 'digital').map(c => ({...c, _kind: 'camera'})));
  }
  if (currentFilter === 'all' || currentFilter === 'lens') {
    items.push(...DATA.lenses.map(l => ({...l, _kind: 'lens', type: 'lens'})));
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = items.filter(item => {
      const searchStr = `${item.brand} ${item.model} ${item.mount || ''} ${item.subtype || ''} ${item.notes || ''}`.toLowerCase();
      return searchStr.includes(q);
    });
  }

  grid.innerHTML = items.map(item => {
    if (item._kind === 'camera') return renderCameraCard(item);
    return renderLensCard(item);
  }).join('');
}

function renderCameraCard(c) {
  const typeClass = c.type;
  const typeLabel = c.type === 'film' ? '필름' : '디지털';
  const specRows = c.type === 'digital' ? `
    <div class="spec-item"><strong>${c.resolution}</strong></div>
    <div class="spec-item">${c.sensor}</div>
    <div class="spec-item"><strong>${c.shutterSpeed?.split('~')[0] || ''}</strong></div>
    <div class="spec-item">${c.weight}</div>
  ` : `
    <div class="spec-item"><strong>${c.subtype}</strong></div>
    <div class="spec-item">${c.filmFormat || '35mm'}</div>
    <div class="spec-item"><strong>${c.shutterSpeed?.split('~')[0] || ''}</strong></div>
    <div class="spec-item">${c.weight}</div>
  `;

  return `
    <div class="card ${typeClass}" onclick="openModal('camera','${c.id}')">
      <div class="compare-check ${compareList.some(x=>x.id===c.id)?'checked':''}" onclick="event.stopPropagation();toggleCompare('camera','${c.id}')">${compareList.some(x=>x.id===c.id)?'✓':''}</div>
      <div class="type-indicator"></div>
      <div class="brand">${c.brand}</div>
      <div class="model-name">${c.model}</div>
      <div class="tag-row">
        <span class="tag ${typeClass}">${typeLabel} · ${c.subtype}</span>
        <span class="tag mount">${c.mount}</span>
        ${c.owned ? '<span class="tag owned">⭐ 보유</span>' : ''}
      </div>
      <div class="specs-preview">${specRows}</div>
      ${c.usedPrice ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:0.8rem;color:var(--accent-film)">💰 중고 ${c.usedPrice}</div>` : ''}
    </div>
  `;
}

function renderLensCard(l) {
  return `
    <div class="card lens" onclick="openModal('lens','${l.id}')">
      <div class="compare-check ${compareList.some(x=>x.id===l.id)?'checked':''}" onclick="event.stopPropagation();toggleCompare('lens','${l.id}')">${compareList.some(x=>x.id===l.id)?'✓':''}</div>
      <div class="type-indicator"></div>
      <div class="brand">${l.brand}</div>
      <div class="model-name">${l.model}</div>
      <div class="tag-row">
        <span class="tag lens">${l.type} 렌즈</span>
        <span class="tag mount">${l.mount}</span>
        ${l.owned ? '<span class="tag owned">⭐ 보유</span>' : ''}
      </div>
      <div class="specs-preview">
        <div class="spec-item"><strong>${l.focalLength}</strong></div>
        <div class="spec-item">${l.aperture}</div>
        <div class="spec-item"><strong>${l.filterSize}</strong></div>
        <div class="spec-item">${l.weight}</div>
      </div>
      ${l.usedPrice ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:0.8rem;color:var(--accent-lens)">💰 중고 ${l.usedPrice}</div>` : ''}
    </div>
  `;
}

          <div class="spec-grid">
            <span class="spec-label">타입</span><span class="spec-value">${item.subtype}</span>
            <span class="spec-label">필름 포맷</span><span class="spec-value">${item.filmFormat || '35mm'}</span>
            <span class="spec-label">마운트</span><span class="spec-value">${item.mount}</span>
            ${item.lens ? `<span class="spec-label">렌즈</span><span class="spec-value">${item.lens}</span>` : ''}
          </div>
        </div>
        <div class="spec-section">
          <h3>⚡ 셔터 & 측광</h3>
          <div class="spec-grid">
            <span class="spec-label">셔터</span><span class="spec-value">${item.shutter}</span>
            <span class="spec-label">셔터 속도</span><span class="spec-value">${item.shutterSpeed}</span>
            <span class="spec-label">플래시 동조</span><span class="spec-value">${item.flashSync || '-'}</span>
            <span class="spec-label">측광</span><span class="spec-value">${item.metering || '-'}</span>
            <span class="spec-label">측광 범위</span><span class="spec-value">${item.meterRange || '-'}</span>
            <span class="spec-label">ISO</span><span class="spec-value">${item.iso || '-'}</span>
          </div>
        </div>
        <div class="spec-section">
          <h3>🔍 파인더</h3>
          <div class="spec-grid">
            <span class="spec-label">파인더</span><span class="spec-value">${item.viewfinder}</span>
            ${item.vfCoverage ? `<span class="spec-label">시야율</span><span class="spec-value">${item.vfCoverage}</span>` : ''}
            ${item.vfMagnification ? `<span class="spec-label">배율</span><span class="spec-value">${item.vfMagnification}</span>` : ''}
            ${item.framelines ? `<span class="spec-label">프레임라인</span><span class="spec-value">${item.framelines}</span>` : ''}
            ${item.focusingScreen ? `<span class="spec-label">스크린</span><span class="spec-value">${item.focusingScreen}</span>` : ''}
          </div>
        </div>
        <div class="spec-section">
          <h3>🔋 전원 & 바디</h3>
          <div class="spec-grid">
            <span class="spec-label">배터리</span><span class="spec-value">${item.battery || '-'}</span>
            <span class="spec-label">배터리 없이</span><span class="spec-value ${battFreeClass}">${item.batteryFree || '-'}</span>
            ${item.motorDrive ? `<span class="spec-label">모터드라이브</span><span class="spec-value">${item.motorDrive}</span>` : ''}
            <span class="spec-label">크기</span><span class="spec-value">${item.dimensions || '-'}</span>
            <span class="spec-label">무게</span><span class="spec-value">${item.weight}</span>
            <span class="spec-label">생산</span><span class="spec-value">${item.produced || '-'}</span>
          </div>
        </div>
        ${item.usedPrice ? `<div class="spec-section">
          <h3>💰 중고 시세</h3>
          <div class="spec-grid">
            <span class="spec-label">시세 범위</span><span class="spec-value highlight">${item.usedPrice}</span>
            <span class="spec-label">참고</span><span class="spec-value">${item.priceNote || '-'}</span>
            <span class="spec-label">조회 시점</span><span class="spec-value">${item.priceDate || '-'}</span>
          </div>
        </div>` : ''}`;
    }
  } else {
    // Lens
    specSections = `
      <div class="spec-section">
        <h3>🔭 광학</h3>
        <div class="spec-grid">
          <span class="spec-label">초점거리</span><span class="spec-value">${item.focalLength}</span>
          <span class="spec-label">개방 조리개</span><span class="spec-value">${item.aperture}</span>
          <span class="spec-label">최소 조리개</span><span class="spec-value">${item.minAperture || '-'}</span>
          <span class="spec-label">렌즈 구성</span><span class="spec-value">${item.elements || '-'}</span>
          <span class="spec-label">조리개 날</span><span class="spec-value">${item.diaphragm || '-'}</span>
        </div>
      </div>
      <div class="spec-section">
        <h3>⚡ AF & 기능</h3>
        <div class="spec-grid">
          <span class="spec-label">최단 초점</span><span class="spec-value">${item.minFocus}</span>
          <span class="spec-label">최대 배율</span><span class="spec-value">${item.maxMagnification || '-'}</span>
          <span class="spec-label">필터 구경</span><span class="spec-value">${item.filterSize}</span>
          <span class="spec-label">손떨림보정</span><span class="spec-value">${item.stabilization || '-'}</span>
          <span class="spec-label">방진방적</span><span class="spec-value">${item.weather_seal || '-'}</span>
        </div>
      </div>
      <div class="spec-section">
        <h3>📐 물리</h3>
        <div class="spec-grid">
          <span class="spec-label">크기</span><span class="spec-value">${item.dimensions || '-'}</span>
          <span class="spec-label">무게</span><span class="spec-value">${item.weight}</span>
          <span class="spec-label">출시</span><span class="spec-value">${item.released || '-'}</span>
          <span class="spec-label">출시가</span><span class="spec-value">${item.msrp || '-'}</span>
        </div>
      </div>
      ${item.usedPrice ? `<div class="spec-section">
        <h3>💰 중고 시세</h3>
        <div class="spec-grid">
          <span class="spec-label">시세 범위</span><span class="spec-value highlight">${item.usedPrice}</span>
          <span class="spec-label">참고</span><span class="spec-value">${item.priceNote || '-'}</span>
          <span class="spec-label">조회 시점</span><span class="spec-value">${item.priceDate || '-'}</span>
        </div>
      </div>` : ''}`;
  }

  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-brand">${item.brand}</div>
      <div class="modal-model">${item.model}</div>
      <div class="modal-tags">
        <span class="tag ${typeClass}">${kind === 'lens' ? '렌즈' : item.type === 'film' ? '필름 · ' + item.subtype : '디지털 · ' + item.subtype}</span>
        <span class="tag mount">${item.mount}</span>
        ${item.owned ? '<span class="tag owned">⭐ 보유 중</span>' : ''}
      </div>
      ${item.notes ? `<div class="modal-note">${item.notes}</div>` : ''}
    </div>
    ${specSections}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── EVENTS ──
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderGrid();
  });
});

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderGrid();
});

// ── COMPARE ──
function toggleCompare(kind, id) {
  const idx = compareList.findIndex(x => x.id === id);
  if (idx >= 0) {
    compareList.splice(idx, 1);
  } else {
    if (compareList.length >= 4) { alert('최대 4개까지 비교 가능합니다'); return; }
    compareList.push({kind, id});
  }
  updateCompareBar();
  renderGrid();
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const items = document.getElementById('selected-items');
  const btn = document.getElementById('compare-btn');
  
  if (compareList.length === 0) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  
  items.innerHTML = compareList.map(x => {
    const item = x.kind === 'camera' ? DATA.cameras.find(c=>c.id===x.id) : DATA.lenses.find(l=>l.id===x.id);
    return `<div class="selected-chip">${item.brand} ${item.model} <span class="remove" onclick="toggleCompare('${x.kind}','${x.id}')">✕</span></div>`;
  }).join('');
  
  btn.disabled = compareList.length < 2;
}

function showCompare() {
  if (compareList.length < 2) return;
  
  const items = compareList.map(x => {
    return x.kind === 'camera' ? DATA.cameras.find(c=>c.id===x.id) : DATA.lenses.find(l=>l.id===x.id);
  });
  
  // Determine if all cameras, all lenses, or mixed
  const allCameras = compareList.every(x => x.kind === 'camera');
  const allLenses = compareList.every(x => x.kind === 'lens');
  
  let rows = [];
  if (allCameras) {
    const allFilm = items.every(i => i.type === 'film');
    const allDigital = items.every(i => i.type === 'digital');
    
    rows = [
      ['타입', ...items.map(i => i.type === 'film' ? '🎞️ 필름 ' + i.subtype : '🖥️ 디지털 ' + i.subtype)],
      ['마운트', ...items.map(i => i.mount)],
      ['센서/필름', ...items.map(i => i.type === 'digital' ? i.sensor : (i.filmFormat || '35mm'))],
    ];
    if (items.some(i => i.resolution)) rows.push(['해상도', ...items.map(i => i.resolution || '-')]);
    rows.push(
      ['셔터', ...items.map(i => i.shutter)],
      ['셔터 속도', ...items.map(i => i.shutterSpeed)],
      ['측광', ...items.map(i => i.metering || '-')],
      ['ISO', ...items.map(i => i.iso || '-')],
      ['파인더', ...items.map(i => i.viewfinder)],
      ['파인더 배율', ...items.map(i => i.vfMagnification || '-')]
    );
    if (items.some(i => i.af)) rows.push(['AF', ...items.map(i => i.af || '-')]);
    if (items.some(i => i.burst)) rows.push(['연사', ...items.map(i => i.burst || '-')]);
    if (items.some(i => i.video)) rows.push(['동영상', ...items.map(i => i.video || '-')]);
    if (items.some(i => i.stabilization)) rows.push(['손떨림보정', ...items.map(i => i.stabilization || '-')]);
    rows.push(
      ['배터리 없이', ...items.map(i => i.batteryFree || '-')],
      ['무게', ...items.map(i => i.weight)],
      ['크기', ...items.map(i => i.dimensions || '-')],
      ['💰 중고 시세', ...items.map(i => i.usedPrice || '-')]
    );
    if (items.some(i => i.msrp)) rows.push(['출시가', ...items.map(i => i.msrp || '-')]);
  } else if (allLenses) {
    rows = [
      ['마운트', ...items.map(i => i.mount)],
      ['초점거리', ...items.map(i => i.focalLength)],
      ['조리개', ...items.map(i => i.aperture)],
      ['렌즈 구성', ...items.map(i => i.elements || '-')],
      ['최단 초점', ...items.map(i => i.minFocus)],
      ['최대 배율', ...items.map(i => i.maxMagnification || '-')],
      ['필터 구경', ...items.map(i => i.filterSize)],
      ['손떨림보정', ...items.map(i => i.stabilization || '-')],
      ['방진방적', ...items.map(i => i.weather_seal || '-')],
      ['무게', ...items.map(i => i.weight)],
      ['💰 중고 시세', ...items.map(i => i.usedPrice || '-')],
      ['출시가', ...items.map(i => i.msrp || '-')]
    ];
  } else {
    rows = [
      ['타입', ...items.map(i => i.type === 'lens' ? '🔭 렌즈' : i.type === 'film' ? '🎞️ 필름' : '🖥️ 디지털')],
      ['마운트', ...items.map(i => i.mount)],
      ['무게', ...items.map(i => i.weight)],
      ['💰 중고 시세', ...items.map(i => i.usedPrice || '-')]
    ];
  }
  
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-model" style="font-size:1.4rem">📊 스펙 비교</div>
      <div style="color:var(--text2);font-size:0.85rem">${items.map(i=>i.brand+' '+i.model).join(' vs ')}</div>
    </div>
    <table class="compare-table">
      <thead>
        <tr>
          <th></th>
          ${items.map(i => `<th class="model-header">${i.model}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${rows.map(row => `<tr><td style="color:var(--text2)">${row[0]}</td>${row.slice(1).map(v => `<td>${v}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>
  `;
  
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ── INIT ──
init();
</script>
</body>
</html>
